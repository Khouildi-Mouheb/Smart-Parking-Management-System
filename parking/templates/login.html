{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Parki Karhabti</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0c10; --surface: #12151c; --border: #2a2f3d; --accent: #00e5a0; --text: #e8eaf0; --muted: #6b7280; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
        .form-control { width: 100%; background: #1a1e28; border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; background: var(--accent); color: #000; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
        .error { background: rgba(239,68,68,0.15); color: #ef4444; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(239,68,68,0.3); }
        .success { background: rgba(16,185,129,0.15); color: #10b981; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(16,185,129,0.3); }
        a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><img src="{% static 'logo.png' %}" alt="Logo" style="height: 60px; vertical-align: middle; margin-right: 8px;">Parki Karhabti</div>
        <div style="color: var(--muted); margin-bottom: 30px;">Company Parking Portal</div>
        
        {% if request.GET.success == '1' %}
        <div class="success"><strong>Account Created!</strong><br> You can now log in.</div>
        {% endif %}
        
        {% if error %}
        <div class="error"><strong>Authentication Failed</strong><br>{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="worker@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>

        <div style="font-size: 13px; color: var(--muted); margin-top: 20px;">
            Don't have an account? <a href="/register/">Register here</a>
        </div>
    </div>
</body>
</html>
