<!-- Booking Modal -->
<div class="modal-overlay" id="booking-modal">
    <div class="modal">
        <div class="flex justify-between items-center mb-4">
            <div class="modal-title">📅 Book a Parking Spot</div>
            <button class="btn btn-outline btn-sm" onclick="closeModal('booking-modal')">✕</button>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Your Vehicle</label>
                <select id="book-vehicle" class="form-control"></select>
            </div>
            <div class="form-group">
                <label>Entry Date & Time</label>
                <input type="datetime-local" id="book-start" class="form-control">
            </div>
            <div class="form-group">
                <label>Exit Date & Time</label>
                <input type="datetime-local" id="book-end" class="form-control">
            </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
            <button class="btn btn-accent" onclick="submitBooking()">Find Spot & Book</button>
            <button class="btn btn-outline" onclick="closeModal('booking-modal')">Cancel</button>
        </div>
    </div>
</div>

<!-- Booking Confirmation / QR Modal -->
<div class="modal-overlay" id="booking-qr-modal">
    <div class="modal" style="text-align:center;max-width:420px;">
        <div class="flex justify-between items-center mb-4">
            <div class="modal-title">✅ Booking Confirmed!</div>
            <button class="btn btn-outline btn-sm" onclick="closeModal('booking-qr-modal')">✕</button>
        </div>
        <div id="booking-qr-info" style="margin-bottom:16px;background:var(--surface2);border-radius:10px;padding:14px;text-align:left;font-size:13px;"></div>
        <div style="background:#fff;border-radius:12px;padding:16px;display:inline-block;margin-bottom:16px;">
            <img id="booking-qr-image" src="" alt="QR Code" style="width:200px;height:200px;display:block;">
        </div>
        <div class="text-xs text-muted mb-4">Scan this QR code at the entry gate at your booking time.</div>
        <div style="display:flex;gap:10px;justify-content:center;">
            <button class="btn btn-outline" onclick="closeModal('booking-qr-modal')">Close</button>
        </div>
    </div>
</div>
