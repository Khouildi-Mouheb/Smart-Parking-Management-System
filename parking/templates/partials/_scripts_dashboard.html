<script>
const API = '/api/parking';
const H = { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') };

// =================== DASHBOARD ===================
async function loadDashboard() {
    try {
        const [stats, revenue, subs, alerts] = await Promise.all([
            fetch(`${API}/places/stats/`).then(r=>r.json()),
            fetch(`${API}/sessions/revenue/`).then(r=>r.json()),
            fetch(`${API}/subscriptions/active/`).then(r=>r.json()),
            fetch(`${API}/alerts/unread/`).then(r=>r.json()),
        ]);

        if (CURRENT_USER_ROLE === 'client') {
            // Hide irrelevant money/admin metrics for simple workers
            document.getElementById('stat-revenue-today').parentElement.style.display = 'none';
            document.getElementById('stat-subscriptions').parentElement.style.display = 'none';
            document.getElementById('revenue-chart').parentElement.closest('.card').style.display = 'none';
            document.getElementById('recent-sessions-table').closest('.card').style.display = 'none';
            document.getElementById('floor-stats').parentElement.style.gridColumn = '1 / -1';
        }

        document.getElementById('stat-available').textContent = stats.available;
        document.getElementById('stat-occupied').textContent = stats.occupied;
        document.getElementById('stat-occupancy-rate').textContent = `${stats.occupancy_rate}% occupancy`;
        document.getElementById('stat-available-sub').textContent = `of ${stats.total} total places`;
        document.getElementById('stat-revenue-today').textContent = `${revenue.today} DT`;
        document.getElementById('stat-revenue-month').textContent = `This month: ${revenue.month} DT`;
        document.getElementById('stat-subscriptions').textContent = subs.length;

        // Floor stats
        const floorHtml = stats.by_floor.map(f => `
            <div style="margin-bottom:12px;">
                <div class="flex justify-between text-sm mb-1">
                    <span>Floor ${f.floor}</span>
                    <span class="text-muted">${f.occupied}/${f.total}</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width:${f.total > 0 ? (f.occupied/f.total*100) : 0}%;background:${f.occupied/f.total > 0.8 ? 'var(--red)' : f.occupied/f.total > 0.5 ? 'var(--yellow)' : 'var(--green)'}"></div>
                </div>
            </div>
        `).join('');
        document.getElementById('floor-stats').innerHTML = floorHtml || '<div class="text-muted text-sm">No floors data</div>';

        // Alerts badge
        const alertCount = alerts.length;
        const badge = document.getElementById('alert-count');
        if (alertCount > 0) { badge.style.display = 'inline'; badge.textContent = alertCount; }
        else { badge.style.display = 'none'; }

        // Recent sessions
        if (CURRENT_USER_ROLE !== 'client') {
        const sessions = await fetch(`${API}/sessions/?ordering=-entry_time`).then(r=>r.json());
        const sessionData = sessions.results || sessions;
        const tbody = document.getElementById('recent-sessions-table');
        if (!sessionData.length) {
            tbody.innerHTML = '<tr><td colspan="9" class="text-muted text-sm">No sessions yet</td></tr>';
        } else {
            tbody.innerHTML = sessionData.slice(0,10).map(s => `
                <tr>
                    <td class="text-muted text-xs">#${s.id}</td>
                    <td><strong>${s.vehicle_plate||'—'}</strong></td>
                    <td class="text-muted text-xs">${s.vehicle||'—'}</td>
                    <td><span class="badge badge-blue">${s.place_number||'—'} F${s.place_floor||'?'}</span></td>
                    <td class="text-xs text-muted">${new Date(s.entry_time).toLocaleString('fr-FR')}</td>
                    <td class="text-xs">${s.duration_display||'—'}</td>
                    <td>${s.total_price != null ? `<strong>${s.total_price} DT</strong>` : '—'}</td>
                    <td>${s.is_active ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-red">Closed</span>'}</td>
                    <td>${s.is_active ? `<button class="btn btn-danger btn-sm" onclick="quickExit(${s.id})">Exit</button>` : ''}</td>
                </tr>
            `).join('');
        }
        }
    } catch(e) { console.error(e); }
}

// =================== MAP ===================
async function loadParkingMap() {
    try {
        const data = await fetch(`${API}/places/`).then(r=>r.json());
        const places = data.results || data;
        const floors = [...new Set(places.map(p=>p.floor))].sort();
        let html = '';
        for (const floor of floors) {
            const floorPlaces = places.filter(p => p.floor === floor);
            html += `<div style="margin-bottom:20px;">
                <div class="text-sm font-bold mb-2" style="color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Floor ${floor} — ${floorPlaces.filter(p=>!p.is_occupied && !p.is_reserved).length} free / ${floorPlaces.length}</div>
                <div class="place-grid">
                ${floorPlaces.map(p => {
                    let cls = p.is_occupied ? 'occupied' : (p.is_reserved ? 'reserved' : 'free');
                    if (p.place_type === 'electric' && !p.is_occupied) cls = 'electric';
                    const icons = { standard: '', vip: '⭐', electric: '⚡', handicapped: '♿' };
                    
                    let clickAttr = '';
                    if (!p.is_occupied) {
                        clickAttr = `onclick="toggleReserve(${p.id}, ${p.is_reserved})" style="cursor:pointer;"`;
                    } else {
                        clickAttr = `style="cursor:not-allowed;"`;
                    }
                    return `<div class="place-cell ${cls}" title="${p.number} — ${p.place_type} — ${p.status}" ${clickAttr}>${icons[p.place_type]||''}${p.number}</div>`;
                }).join('')}
                </div>
            </div>`;
        }
        document.getElementById('parking-map-container').innerHTML = html || '<div class="text-muted text-sm">No places found. Add places first.</div>';
    } catch(e) { console.error(e); }
}

// =================== SESSIONS ===================
async function loadActiveSessions() {
    try {
        const data = await fetch(`${API}/sessions/active/`).then(r=>r.json());
        const sessions = data.results || data;
        const tbody = document.getElementById('active-sessions-table');
        if (!sessions.length) {
            tbody.innerHTML = '<tr><td colspan="10" class="text-muted text-sm">No active sessions</td></tr>';
            return;
        }
        tbody.innerHTML = sessions.map(s => `
            <tr>
                <td class="text-muted text-xs">#${s.id}</td>
                <td><strong>${s.vehicle_plate||'—'}</strong></td>
                <td class="text-xs text-muted">${s.vehicle||'—'}</td>
                <td class="text-xs text-muted">—</td>
                <td><span class="badge badge-blue">${s.place_number||'—'}</span></td>
                <td>${s.place_floor||'—'}</td>
                <td class="text-xs">${new Date(s.entry_time).toLocaleString('fr-FR')}</td>
                <td class="text-accent">${s.duration_display||'—'}</td>
                <td>${s.is_subscription_session ? '<span class="badge badge-purple">Sub</span>' : '<span class="badge badge-yellow">Pay</span>'}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="quickExit(${s.id})">Exit</button>
                </td>
            </tr>
        `).join('');
    } catch(e) { console.error(e); }
}

async function quickExit(sessionId) {
    if (!confirm(`Confirm exit for session #${sessionId}?`)) return;
    try {
        const r = await fetch(`${API}/sessions/${sessionId}/exit/`, { method: 'POST', headers: H });
        const d = await r.json();
        if (r.ok) {
            toast(`✅ Exit done! Duration: ${d.duration_display} — Price: ${d.total_price} DT`);
            refreshAll();
        } else toast(JSON.stringify(d), 'error');
    } catch(e) { toast('Error: ' + e, 'error'); }
}

// =================== HISTORY ===================
async function loadHistory() {
    const from = document.getElementById('filter-from').value;
    const to = document.getElementById('filter-to').value;
    const plate = document.getElementById('filter-plate').value;
    let url = `${API}/sessions/history/?`;
    if (from) url += `from=${from}&`;
    if (to) url += `to=${to}&`;
    if (plate) url += `plate=${plate}&`;
    try {
        const data = await fetch(url).then(r=>r.json());
        const sessions = data.results || data;
        const tbody = document.getElementById('history-table');
        if (!sessions.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-muted text-sm">No results found</td></tr>';
            return;
        }
        tbody.innerHTML = sessions.map(s => `
            <tr>
                <td class="text-muted text-xs">#${s.id}</td>
                <td><strong>${s.vehicle_plate||'—'}</strong></td>
                <td><span class="badge badge-blue">${s.place_number||'—'} F${s.place_floor||'?'}</span></td>
                <td class="text-xs">${new Date(s.entry_time).toLocaleString('fr-FR')}</td>
                <td class="text-xs">${s.exit_time ? new Date(s.exit_time).toLocaleString('fr-FR') : '—'}</td>
                <td>${s.duration_display||'—'}</td>
                <td>${s.total_price != null ? `<strong>${s.total_price} DT</strong>` : '—'}</td>
                <td>${s.is_subscription_session ? '<span class="badge badge-purple">Sub</span>' : '<span class="badge badge-yellow">Pay</span>'}</td>
            </tr>
        `).join('');
    } catch(e) { console.error(e); }
}

// =================== VEHICLES ===================
async function loadVehicles() {
    try {
        const data = await fetch(`${API}/vehicles/`).then(r=>r.json());
        const vehicles = data.results || data;
        const tbody = document.getElementById('vehicles-table');
        tbody.innerHTML = vehicles.map(v => `
            <tr>
                <td class="text-muted text-xs">#${v.id}</td>
                <td><strong>${v.plate_number}</strong></td>
                <td>${v.brand} ${v.model||''}</td>
                <td>${v.color}</td>
                <td><span class="badge badge-blue">${v.vehicle_type}</span></td>
                <td class="text-xs text-muted">${v.owner_email||v.owner}</td>
                <td>—</td>
                <td>
                    <button class="btn btn-outline btn-sm" onclick="openEntryForVehicle(${v.id})">Park</button>
                </td>
            </tr>
        `).join('');
    } catch(e) { console.error(e); }
}

function openEntryForVehicle(id) {
    document.getElementById('modal-vehicle-id').value = id;
    openEntryModal();
}
function showAddVehicle() { 
    document.getElementById('add-vehicle-form').style.display = 'block'; 
    if (CURRENT_USER_ROLE === 'client') {
        document.getElementById('v-owner-group').style.display = 'none';
        document.getElementById('v-owner').value = CURRENT_USER_ID;
    }
}

async function addVehicle() {
    const body = {
        owner: document.getElementById('v-owner').value,
        plate_number: document.getElementById('v-plate').value,
        brand: document.getElementById('v-brand').value,
        model: document.getElementById('v-model').value,
        color: document.getElementById('v-color').value,
        vehicle_type: document.getElementById('v-type').value,
    };
    try {
        const r = await fetch(`${API}/vehicles/`, { method: 'POST', headers: H, body: JSON.stringify(body) });
        const d = await r.json();
        if (r.ok) { toast('Vehicle added!'); loadVehicles(); document.getElementById('add-vehicle-form').style.display='none'; }
        else toast(JSON.stringify(d), 'error');
    } catch(e) { toast('Error: '+e, 'error'); }
}

// =================== SUBSCRIPTIONS ===================
async function loadSubscriptions() {
    try {
        const [all, active, expiring] = await Promise.all([
            fetch(`${API}/subscriptions/`).then(r=>r.json()),
            fetch(`${API}/subscriptions/active/`).then(r=>r.json()),
            fetch(`${API}/subscriptions/expiring_soon/`).then(r=>r.json()),
        ]);
        const allList = all.results || all;

        // Active list
        const activeList = active.results || active;
        document.getElementById('active-subs-list').innerHTML = activeList.length ?
            activeList.map(s => `<div style="padding:8px 0;border-bottom:1px solid var(--border);" class="flex justify-between">
                <div><strong class="text-sm">${s.vehicle_plate}</strong> <span class="text-muted text-xs">(${s.user_email})</span></div>
                <div><span class="badge badge-green">${s.plan}</span> <span class="text-xs text-muted">${s.days_remaining}d left</span></div>
            </div>`).join('') : '<div class="text-muted text-sm">No active subscriptions</div>';

        // Expiring list
        const expiringList = expiring.results || expiring;
        document.getElementById('expiring-subs-list').innerHTML = expiringList.length ?
            expiringList.map(s => `<div style="padding:8px 0;border-bottom:1px solid var(--border);" class="flex justify-between">
                <div><strong class="text-sm">${s.vehicle_plate}</strong></div>
                <div><span class="badge badge-yellow">${s.days_remaining}d left</span></div>
            </div>`).join('') : '<div class="text-muted text-sm">None expiring soon</div>';

        // Full table
        const tbody = document.getElementById('subscriptions-table');
        tbody.innerHTML = allList.map(s => `
            <tr>
                <td class="text-muted text-xs">#${s.id}</td>
                <td class="text-xs">${s.user_email||s.user}</td>
                <td>${s.vehicle_plate||s.vehicle}</td>
                <td><span class="badge badge-purple">${s.plan}</span></td>
                <td>${s.price} DT</td>
                <td class="text-xs">${s.start_date}</td>
                <td class="text-xs">${s.end_date}</td>
                <td class="text-accent">${s.days_remaining || '—'}</td>
                <td>${s.status === 'active' ? '<span class="badge badge-green">Active</span>' : s.status === 'expired' ? '<span class="badge badge-red">Expired</span>' : '<span class="badge badge-yellow">Cancelled</span>'}</td>
                <td>${s.status === 'active' ? `<button class="btn btn-danger btn-sm" onclick="cancelSub(${s.id})">Cancel</button>` : ''}</td>
            </tr>
        `).join('');
    } catch(e) { console.error(e); }
}

function showAddSub() {
    document.getElementById('add-sub-form').style.display = 'block';
    document.getElementById('sub-start').value = new Date().toISOString().split('T')[0];
}

async function addSubscription() {
    const plan = document.getElementById('sub-plan').value;
    const prices = { daily: 15, weekly: 70, monthly: 250, annual: 2500 };
    const durations = { daily: 1, weekly: 7, monthly: 30, annual: 365 };
    const start = document.getElementById('sub-start').value;
    const startDate = new Date(start);
    startDate.setDate(startDate.getDate() + durations[plan]);
    const end = startDate.toISOString().split('T')[0];
    const body = {
        user: document.getElementById('sub-user').value,
        vehicle: document.getElementById('sub-vehicle').value,
        plan,
        price: prices[plan],
        start_date: start,
        end_date: end,
        auto_renew: document.getElementById('sub-renew').value === 'true',
    };
    try {
        const r = await fetch(`${API}/subscriptions/`, { method: 'POST', headers: H, body: JSON.stringify(body) });
        const d = await r.json();
        if (r.ok) { toast('Subscription created!'); loadSubscriptions(); document.getElementById('add-sub-form').style.display='none'; }
        else toast(JSON.stringify(d), 'error');
    } catch(e) { toast('Error: '+e, 'error'); }
}

async function cancelSub(id) {
    if (!confirm('Cancel this subscription?')) return;
    try {
        const r = await fetch(`${API}/subscriptions/${id}/cancel/`, { method: 'POST', headers: H });
        if (r.ok) { toast('Subscription cancelled'); loadSubscriptions(); }
    } catch(e) { toast('Error: '+e, 'error'); }
}

// =================== ALERTS ===================
async function loadAlerts() {
    try {
        const data = await fetch(`${API}/alerts/`).then(r=>r.json());
        const alerts = data.results || data;
        const badge = document.getElementById('alert-count');
        const unread = alerts.filter(a => !a.is_read).length;
        if (unread > 0) { badge.style.display = 'inline'; badge.textContent = unread; }
        else badge.style.display = 'none';

        document.getElementById('alerts-list').innerHTML = alerts.length ?
            alerts.map(a => `
                <div class="alert-item ${a.severity}" style="${a.is_read ? 'opacity:0.5' : ''}">
                    <div style="font-size:18px">${a.severity === 'critical' ? '🔴' : a.severity === 'warning' ? '🟡' : 'ℹ️'}</div>
                    <div style="flex:1">
                        <div class="text-sm" style="font-weight:500">${a.message}</div>
                        <div class="text-xs text-muted mt-2">${new Date(a.created_at).toLocaleString('fr-FR')} — ${a.alert_type}</div>
                    </div>
                    ${!a.is_read ? `<button class="btn btn-outline btn-sm" onclick="markRead(${a.id})">Mark Read</button>` : '<span class="text-xs text-muted">Read</span>'}
                </div>
            `).join('') : '<div class="text-muted text-sm">No alerts</div>';
    } catch(e) { console.error(e); }
}

async function markRead(id) {
    await fetch(`${API}/alerts/${id}/mark_read/`, { method: 'POST', headers: H });
    loadAlerts();
}

async function markAllRead() {
    await fetch(`${API}/alerts/mark_all_read/`, { method: 'POST', headers: H });
    loadAlerts();
    toast('All alerts marked as read', 'info');
}

// =================== TARIFFS ===================
async function loadTariffs() {
    try {
        const data = await fetch(`${API}/tariffs/`).then(r=>r.json());
        const tariffs = data.results || data;
        const tbody = document.getElementById('tariffs-table');
        tbody.innerHTML = tariffs.length ? tariffs.map(t => `
            <tr>
                <td class="text-muted text-xs">#${t.id}</td>
                <td>${t.name}</td>
                <td><span class="badge badge-blue">${t.place_type}</span></td>
                <td>${t.base_rate} DT</td>
                <td>${t.hourly_rate} DT/h</td>
                <td>${t.daily_max} DT max</td>
                <td>${t.is_active ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-red">Inactive</span>'}</td>
            </tr>
        `).join('') : '<tr><td colspan="7" class="text-muted text-sm">No tariffs configured</td></tr>';
    } catch(e) { console.error(e); }
}

function showAddTariff() { document.getElementById('add-tariff-form').style.display = 'block'; }

async function addTariff() {
    const body = {
        name: document.getElementById('t-name').value,
        place_type: document.getElementById('t-type').value,
        base_rate: document.getElementById('t-base').value,
        hourly_rate: document.getElementById('t-hourly').value,
        daily_max: document.getElementById('t-max').value,
    };
    try {
        const r = await fetch(`${API}/tariffs/`, { method: 'POST', headers: H, body: JSON.stringify(body) });
        const d = await r.json();
        if (r.ok) { toast('Tariff added!'); loadTariffs(); document.getElementById('add-tariff-form').style.display='none'; }
        else toast(JSON.stringify(d), 'error');
    } catch(e) { toast('Error: '+e, 'error'); }
}

// =================== PLACES MGMT ===================
async function loadPlaces() {
    try {
        const data = await fetch(`${API}/places/`).then(r=>r.json());
        const places = data.results || data;
        const tbody = document.getElementById('places-table');
        tbody.innerHTML = places.map(p => `
            <tr>
                <td class="text-muted text-xs">#${p.id}</td>
                <td><strong>${p.number}</strong></td>
                <td>Floor ${p.floor}</td>
                <td><span class="badge badge-blue">${p.place_type}</span></td>
                <td>${p.is_occupied ? '<span class="badge badge-red">Occupied</span>' : p.is_reserved ? '<span class="badge badge-yellow">Reserved</span>' : '<span class="badge badge-green">Free</span>'}</td>
                <td>
                    ${!p.is_occupied ? `<button class="btn btn-outline btn-sm" onclick="toggleReserve(${p.id}, ${p.is_reserved})">${p.is_reserved ? 'Unreserve' : 'Reserve'}</button>` : ''}
                </td>
            </tr>
        `).join('');
    } catch(e) { console.error(e); }
}

function showAddPlace() { document.getElementById('add-place-form').style.display='block'; }

async function addPlace() {
    const body = {
        number: document.getElementById('p-num').value,
        floor: document.getElementById('p-floor').value,
        place_type: document.getElementById('p-type').value,
    };
    try {
        const r = await fetch(`${API}/places/`, { method: 'POST', headers: H, body: JSON.stringify(body) });
        const d = await r.json();
        if (r.ok) { toast('Place added!'); loadPlaces(); document.getElementById('add-place-form').style.display='none'; }
        else toast(JSON.stringify(d), 'error');
    } catch(e) { toast('Error: '+e, 'error'); }
}

async function toggleReserve(id, currentState) {
    if (currentState) {
        if (!confirm('Cancel this reservation?')) return;
        try {
            const r = await fetch(`${API}/places/${id}/unreserve/`, { method: 'POST', headers: H });
            if (r.ok) { toast('Reservation cancelled'); loadPlaces(); loadParkingMap(); loadDashboard(); }
            else { const d = await r.json(); toast(d.error || 'Cannot cancel', 'error'); }
        } catch(e) { toast('Error: '+e, 'error'); }
    } else {
        if (!confirm('Reserve this place for your vehicle?')) return;
        try {
            const r = await fetch(`${API}/places/${id}/reserve/`, { method: 'POST', headers: H });
            if (r.ok) { toast('Place reserved successfully!'); loadPlaces(); loadParkingMap(); loadDashboard(); }
            else { const d = await r.json(); toast(d.error || 'Cannot reserve', 'error'); }
        } catch(e) { toast('Error: '+e, 'error'); }
    }
}

// =================== BOOKINGS ===================
async function loadMyBookings() {
    if (CURRENT_USER_ROLE !== 'client') return;
    try {
        const data = await fetch(`${API}/bookings/?ordering=-start_time`).then(r=>r.json());
        const bookings = data.results || data;
        const tbody = document.getElementById('bookings-table');
        if (!bookings.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-muted text-sm" style="text-align:center;padding:20px;">You have no bookings.</td></tr>';
            return;
        }
        tbody.innerHTML = bookings.map(b => `
            <tr>
                <td class="text-muted text-xs">#${b.id}</td>
                <td><span class="badge badge-blue">${b.place_number || 'N/A'}</span></td>
                <td><strong>${b.vehicle_plate}</strong></td>
                <td class="text-xs">${new Date(b.start_time).toLocaleString('fr-FR')}</td>
                <td class="text-xs">${new Date(b.end_time).toLocaleString('fr-FR')}</td>
                <td><strong>${b.estimated_price} DT</strong></td>
                <td><span class="badge ${b.status === 'confirmed' ? 'badge-green' : 'badge-yellow'}">${b.status}</span></td>
                <td>
                    ${b.qr_code ? `<button class="btn btn-outline btn-sm" onclick="showBookingQR(${b.id})">Show QR</button>` : ''}
                </td>
            </tr>
        `).join('');
    } catch(e) { console.error(e); }
}

async function openBookingModal() {
    try {
        const data = await fetch(`${API}/vehicles/`).then(r=>r.json());
        const vehicles = data.results || data;
        const select = document.getElementById('book-vehicle');
        if (!vehicles.length) {
            toast('You must add a vehicle first!', 'error');
            window.showTab('vehicles');
            return;
        }
        select.innerHTML = vehicles.map(v => `<option value="${v.id}">${v.plate_number} (${v.brand})</option>`).join('');
        
        const start = new Date();
        start.setMinutes(start.getMinutes() + 15 - (start.getMinutes() % 15));
        start.setSeconds(0);
        start.setMilliseconds(0);
        const end = new Date(start.getTime() + (60 * 60 * 1000));
        
        const tzOffset = new Date().getTimezoneOffset() * 60000;
        document.getElementById('book-start').value = new Date(start.getTime() - tzOffset).toISOString().slice(0,16);
        document.getElementById('book-end').value = new Date(end.getTime() - tzOffset).toISOString().slice(0,16);

        document.getElementById('booking-modal').classList.add('open');
    } catch(e) { toast('Could not load vehicles.', 'error'); }
}

async function submitBooking() {
    const startInput = document.getElementById('book-start').value;
    const endInput = document.getElementById('book-end').value;
    const vehicleInput = document.getElementById('book-vehicle').value;
    if (!vehicleInput || !startInput || !endInput) return toast('All fields are required.', 'error');

    const body = {
        vehicle: vehicleInput,
        start_time: new Date(startInput).toISOString(),
        end_time: new Date(endInput).toISOString(),
    };
    try {
        const r = await fetch(`${API}/bookings/`, { method: 'POST', headers: H, body: JSON.stringify(body) });
        const d = await r.json();
        if (r.ok) {
            toast('Booking successful!', 'success');
            closeModal('booking-modal');
            loadMyBookings();
            showBookingQR(d.id, d);
        } else { toast(d.error || JSON.stringify(d), 'error'); }
    } catch(e) { toast('Error: '+e, 'error'); }
}

async function showBookingQR(bookingId, bookingData = null) {
    try {
        const booking = bookingData || await fetch(`${API}/bookings/${bookingId}/`).then(r=>r.json());
        if (booking.qr_code) {
            document.getElementById('booking-qr-image').src = booking.qr_code + '?t=' + Date.now();
            document.getElementById('booking-qr-info').innerHTML = `
                <div style="margin-bottom:6px;"><strong style="color:var(--accent)">Booking #${booking.id}</strong></div>
                <div>🚗 <strong>${booking.vehicle_plate}</strong></div>
                <div>📍 Place <strong>${booking.place_number || '—'}</strong></div>
                <div><strong class="text-green">FROM:</strong> ${new Date(booking.start_time).toLocaleString('fr-FR')}</div>
                <div><strong class="text-red">TO:</strong> ${new Date(booking.end_time).toLocaleString('fr-FR')}</div>
                <div style="margin-top:8px;font-size:16px;">Est. Price: <strong class="text-accent">${booking.estimated_price} DT</strong></div>
            `;
            document.getElementById('booking-qr-modal').classList.add('open');
        } else { toast('QR code not available for this booking.', 'info'); }
    } catch(e) { toast('Could not load booking details.', 'error'); }
}

// =================== OVERRIDE showTab TO LOAD DATA ===================
const originalShowTab = window.showTab;
window.showTab = function(name, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const tab = document.getElementById('tab-' + name);
    if (tab) tab.classList.add('active');
    if (el) el.classList.add('active');
    // Load data for tab
    const loaders = {
        dashboard: loadDashboard,
        map: loadParkingMap,
        sessions: loadActiveSessions,
        vehicles: loadVehicles,
        subscriptions: loadSubscriptions,
        alerts: loadAlerts,
        tariffs: loadTariffs,
        'places-mgmt': loadPlaces,
        bookings: loadMyBookings,
    };
    if (loaders[name]) loadersname;
};

// Override refreshAll
window.refreshAll = function() {
    loadDashboard();
    loadActiveSessions();
    loadParkingMap();
    loadAlerts();
};

// Init
loadDashboard();
loadAlerts();
</script>
