<!-- Entry Modal -->
<div class="modal-overlay" id="entry-modal">
    <div class="modal">
        <div class="flex justify-between items-center mb-4">
            <div class="modal-title">🚗 Register Vehicle Entry</div>
            <button class="btn btn-outline btn-sm" onclick="closeModal('entry-modal')">✕</button>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Vehicle ID</label>
                <input type="number" id="modal-vehicle-id" class="form-control" placeholder="e.g. 1">
            </div>
            <div class="form-group">
                <label>Notes (optional)</label>
                <input type="text" id="modal-notes" class="form-control" placeholder="Any notes...">
            </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
            <button class="btn btn-accent" onclick="submitEntry()">Register Entry</button>
            <button class="btn btn-outline" onclick="closeModal('entry-modal')">Cancel</button>
        </div>
    </div>
</div>

<!-- Exit Modal -->
<div class="modal-overlay" id="exit-modal">
    <div class="modal">
        <div class="flex justify-between items-center mb-4">
            <div class="modal-title">🚪 Register Vehicle Exit</div>
            <button class="btn btn-outline btn-sm" onclick="closeModal('exit-modal')">✕</button>
        </div>
        <div class="form-group mb-4">
            <label>Session ID</label>
            <input type="number" id="modal-session-id" class="form-control" placeholder="Enter session ID">
        </div>
        <div id="exit-preview" style="display:none" class="card" style="margin-bottom:12px;"></div>
        <div style="display:flex;gap:10px;">
            <button class="btn btn-danger" onclick="submitExit()">Confirm Exit & Calculate</button>
            <button class="btn btn-outline" onclick="closeModal('exit-modal')">Cancel</button>
        </div>
    </div>
</div>


<!-- QR Code Modal -->
<div class="modal-overlay" id="qr-modal">
    <div class="modal" style="text-align:center;max-width:420px;">
        <div class="flex justify-between items-center mb-4">
            <div class="modal-title">🎫 Parking Ticket</div>
            <button class="btn btn-outline btn-sm" onclick="closeModal('qr-modal')">✕</button>
        </div>
        <div id="qr-session-info" style="margin-bottom:16px;background:var(--surface2);border-radius:10px;padding:14px;text-align:left;font-size:13px;"></div>
        <div style="background:#fff;border-radius:12px;padding:16px;display:inline-block;margin-bottom:16px;">
            <img id="qr-image" src="" alt="QR Code" style="width:200px;height:200px;display:block;">
        </div>
        <div class="text-xs text-muted mb-4">Scan this QR code at exit for quick checkout</div>
        <div style="display:flex;gap:10px;justify-content:center;">
            <button class="btn btn-accent" onclick="printQR()">🖨️ Print Ticket</button>
            <button class="btn btn-outline" onclick="closeModal('qr-modal')">Close</button>
        </div>
    </div>
</div>
