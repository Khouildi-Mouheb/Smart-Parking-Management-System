{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Parki Karhabti</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0c10; --surface: #12151c; --border: #2a2f3d; --accent: #00e5a0; --text: #e8eaf0; --muted: #6b7280; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
        .form-control { width: 100%; background: #1a1e28; border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; background: var(--accent); color: #000; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
        .error { background: rgba(239,68,68,0.15); color: #ef4444; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(239,68,68,0.3); }
        a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><img src="{% static 'logo.png' %}" alt="Logo" style="height: 60px; vertical-align: middle; margin-right: 8px;">Parki Karhabti</div>
        <div style="color: var(--muted); margin-bottom: 30px;">Create Your Account</div>
        
        {% if error %}
        <div class="error"><strong>Registration Failed</strong><br>{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="">
            {% csrf_token %}
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="Your full name" required value="{{ request.POST.full_name }}">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role" class="form-control">
                    <option value="client" {% if request.POST.role == 'client' %}selected{% endif %}>Client (Worker)</option>
                    <option value="agent" {% if request.POST.role == 'agent' %}selected{% endif %}>Agent</option>
                    <option value="admin" {% if request.POST.role == 'admin' %}selected{% endif %}>Company Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label>Company Name (Required to see parking spots)</label>
                <input type="text" name="company_name" class="form-control" placeholder="e.g. Acme Inc." required value="{{ request.POST.company_name }}">
            </div>
            <div class="form-group">
                <label>Company Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="worker@company.com" required value="{{ request.POST.email }}">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="password2" class="form-control" required>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <div style="font-size: 13px; color: var(--muted); margin-top: 20px;">
            Already have an account? <a href="/login/">Sign In</a>
        </div>
    </div>
</body>
</html>
