<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartPark Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --surface: #12151c;
            --surface2: #1a1e28;
            --border: #2a2f3d;
            --accent: #00e5a0;
            --text: #e8eaf0;
            --muted: #6b7280;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
        .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
        .form-control { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; box-sizing: border-box; transition: border 0.2s; }
        .form-control:focus { border-color: var(--accent); }
        .btn { width: 100%; background: var(--accent); color: #000; padding: 12px; border-radius: 8px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 10px; transition: background 0.2s; }
        .btn:hover { background: #00c88a; }
        .error { background: rgba(239,68,68,0.15); color: #ef4444; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; border: 1px solid rgba(239,68,68,0.3); text-align: left; }
        .footer-link { font-size: 13px; color: var(--muted); margin-top: 24px; }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">⚡ SmartPark</div>
        <div class="subtitle">Create Your Worker Account</div>
        
        {% if error %}
        <div class="error">
            <strong>Registration Failed</strong><br>
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="">
            {% csrf_token %}
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="Your full name" required value="{{ request.POST.full_name }}">
            </div>
            <div class="form-group">
                <label>Company Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="worker@company.com" required value="{{ request.POST.email }}">
            </div>
            <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" placeholder="••••••••" required></div>
            <div class="form-group"><label>Confirm Password</label><input type="password" name="password2" class="form-control" placeholder="••••••••" required></div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <div class="footer-link">Already have an account? <a href="/login/">Sign In</a></div>
    </div>
</body>
</html>
